            type: integer
            description: 'Optional. Number of results to return (min 1, max 100). Defaults to 50.'
            example: 50
        -
          in: query
          name: starting_after
          description: 'Optional. Return results after this destination UUID (cursor).'
          example: c0ec8113-aa15-40ac-8437-47185dd9dcf4
