      required: true
      schema: { type: string }
    CdrDateTo:
      in: query
      name: date_to
      description: 'ISO 8601 end of window (UTC). Required. Window must not exceed 30 days from date_from.'
      example: '2026-04-15T00:00:00Z'
      required: true
      schema: { type: string }
    CdrDirection:
      in: query
      name: direction
      required: false
      schema: { type: string, enum: [inbound, outbound, local] }
    CdrStatus:
      in: query
      name: status
      required: false
      schema: { type: string, enum: [answered, missed, voicemail, abandoned, busy, no_answer, failed] }
  responses:
    Unauthenticated:
      description: Unauthenticated
      content:
        application/json:
          schema:
            type: object
            example:
              error:
                type: authentication_error
                message: Unauthenticated.
                code: unauthenticated
    ForbiddenDomain:
      description: 'Forbidden (token not permitted for this domain)'
      content:
        application/json:
          schema:
            type: object
            example:
              error:
                type: invalid_request_error
                message: 'This token is not permitted to access that domain.'
                code: forbidden_domain
                param: domain_uuid
    WindowValidation:
      description: 'Date window validation failure'
      content:
        application/json:
          schema:
            type: object
            example:
              error:
                type: invalid_request_error
                message: 'Window exceeds the maximum of 30 days.'
                code: window_too_large
                param: date_to
    ResourceMissing:
      description: 'Resource not found'
      content:
        application/json:
          schema:
            type: object
            example:
              error:
                type: invalid_request_error
                message: 'CDR not found.'
                code: resource_missing
                param: xml_cdr_uuid
security:
  -
    default: []
