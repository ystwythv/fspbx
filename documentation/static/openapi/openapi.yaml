  '/api/v1/domains/{domain_uuid}/api-tokens':
    get:
      summary: 'List tenant API tokens'
      operationId: listTenantApiTokens
      description: "Tenant self-service token management. The calling token must be bound to this `domain_uuid`, and the caller must have the `api_token_self_manage` permission."
      responses:
        200: { description: Success }
        401: { $ref: '#/components/responses/Unauthenticated' }
        403: { $ref: '#/components/responses/ForbiddenDomain' }
      tags: ['Tenant API Tokens']
    post:
      summary: 'Create a tenant API token'
      operationId: createTenantApiToken
      description: "Mints a token bound to this `domain_uuid`. Tenants cannot grant themselves the `cdr:all-domains` ability — it will be silently stripped."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string, example: 'Accounting dashboard' }
                expires_at: { type: string, example: '2027-04-22T00:00:00Z' }
                abilities: { type: array, items: { type: string }, example: [cdr:read] }
      responses:
        201: { description: Created }
        401: { $ref: '#/components/responses/Unauthenticated' }
        403: { $ref: '#/components/responses/ForbiddenDomain' }
      tags: ['Tenant API Tokens']
    parameters:
      - { in: path, name: domain_uuid, required: true, schema: { type: string } }
  '/api/v1/domains/{domain_uuid}/api-tokens/{token_id}':
    delete:
      summary: 'Revoke a tenant API token'
      operationId: revokeTenantApiToken
      responses:
        200: { description: Revoked }
        401: { $ref: '#/components/responses/Unauthenticated' }
        403: { $ref: '#/components/responses/ForbiddenDomain' }
        404: { $ref: '#/components/responses/ResourceMissing' }
      tags: ['Tenant API Tokens']
    parameters:
      - { in: path, name: domain_uuid, required: true, schema: { type: string } }
      - { in: path, name: token_id, required: true, schema: { type: string } }
  /api/v1/admin/api-tokens:
    get:
      summary: 'List API tokens'
      operationId: listApiTokens
      description: "Lists all Sanctum personal access tokens. Requires the `api_token_manage` permission.\n\nTokens with a non-null `domain_uuid` are tenant-scoped; `null` means global."
      parameters:
        -
          in: query
          name: limit
          required: false
          schema: { type: integer }
        -
          in: query
          name: starting_after
          required: false
          schema: { type: string }
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                type: object
                example:
                  object: list
                  url: /api/v1/admin/api-tokens
                  has_more: false
                  data:
                    -
                      object: api_token
                      id: 0b8f1c2a-3d4e-5f67-89ab-cdef01234567
                      name: 'Voxra dashboards'
                      type: global
                      domain_uuid: null
                      abilities: [cdr:read, cdr:all-domains]
                      last_used_at: '2026-04-22T10:01:02Z'
                      expires_at: null
                      created_at: '2026-04-10T08:00:00Z'
        401: { $ref: '#/components/responses/Unauthenticated' }
      tags:
        - 'Admin API Tokens'
    post:
      summary: 'Create an API token'
      operationId: createApiToken
      description: "Creates a new Sanctum personal access token. Requires the `api_token_manage` permission.\n\nThe plain-text token is returned once in `token` and is unrecoverable afterwards."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, type]
              properties:
                name:
                  type: string
                  example: 'BluePeak tenant dashboard'
                type:
                  type: string
                  enum: [global, tenant]
                  example: tenant
                domain_uuid:
                  type: string
                  description: 'Required when type=tenant; forbidden when type=global.'
                  example: 4018f7a3-8e0a-47bb-9f4f-04b1313e0e1b
                expires_at:
                  type: string
                  description: 'Optional ISO 8601 expiry.'
                  example: '2027-04-22T00:00:00Z'
                abilities:
                  type: array
                  items: { type: string }
                  example: [cdr:read]
      responses:
        201:
          description: Created
          content:
            application/json:
              schema:
                type: object
                example:
                  object: api_token
                  id: 0b8f1c2a-3d4e-5f67-89ab-cdef01234567
                  name: 'BluePeak tenant dashboard'
                  type: tenant
                  domain_uuid: 4018f7a3-8e0a-47bb-9f4f-04b1313e0e1b
                  abilities: [cdr:read]
                  expires_at: '2027-04-22T00:00:00Z'
                  created_at: '2026-04-22T17:30:00Z'
                  token: '1|abcdefghijklmnopqrstuvwxyz0123456789'
        401: { $ref: '#/components/responses/Unauthenticated' }
        422: { $ref: '#/components/responses/WindowValidation' }
      tags:
        - 'Admin API Tokens'
  '/api/v1/admin/api-tokens/{token_id}':
    delete:
      summary: 'Revoke an API token'
      operationId: revokeApiToken
      description: "Permanently deletes the token. Requires the `api_token_manage` permission."
      responses:
        200:
          description: Revoked
          content:
            application/json:
              schema:
                type: object
                example:
                  object: api_token
                  id: 0b8f1c2a-3d4e-5f67-89ab-cdef01234567
                  deleted: true
        401: { $ref: '#/components/responses/Unauthenticated' }
        404: { $ref: '#/components/responses/ResourceMissing' }
      tags:
        - 'Admin API Tokens'
    parameters:
      -
        in: path
        name: token_id
        required: true
        schema: { type: string }
